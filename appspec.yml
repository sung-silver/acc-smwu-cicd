version: 0.0
os: linux

files:
  - source: /
    destination: /home/ubuntu/app
    overwrite: yes

permissions:
  - object: /
    pattern: "**"
    owner: ubuntu
    group: ubuntu

hooks:
  BeforeInstall:
    - location: nonstop/permission.sh
      timeout: 30
      runas: ubuntu

  AfterInstall:
    - location: nonstop/deploy.sh
      timeout: 60
      runas: ubuntu