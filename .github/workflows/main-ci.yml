name: Continuous Integration for CICD Project

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: ⚙️ Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'corretto'
          cache: gradle

      - name: 🤝 Grant execute permission for gradlew
        run: chmod +x ./gradlew
        shell: bash

      - name: 🧱 Build
        run: ./gradlew build
        shell: bash